<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Detector</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Background Image */
            background: url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72?q=80&w=1600') no-repeat center center/cover;

            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        h1 {
            font-size: 40px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌍 Language Detector BY Himanshu Bhardwaj</h1>
        <h3>Using Natural Language Processing (NLP)</h3>

        <input type="text" id="inputtext" placeholder="Enter text (min 9 words)">
        <br>
        <button onclick="predict()">Check Language</button>

        <h3 id="result"></h3>
    </div>

    <script>
        async function predict() {
            let text = document.getElementById("inputtext").value;

            let response = await fetch("http://127.0.0.1:8000/prediction",{
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text: text })
            });

            let data = await response.json();

            document.getElementById("result").innerText =
                "Prediction: " + data.prediction;
        }
    </script>

</body>
</html>
